<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FFFFFF" />
    <meta
      name="description"
      content="Saarthi — your AI saarthi for everyday India. Spot scams, decode any document, find government schemes you deserve, and save on health. In your language."
    />
    <title>Saarthi · आपका रोज़मर्रा का AI सारथि</title>

    <!-- Apply the saved / system theme before paint to avoid a flash -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem("saarthi.theme");
          var dark = s === "dark" || (!s && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>

    <!-- Fonts: Familjen Grotesk (display), Hanken Grotesk (body), Noto Sans Devanagari (Hindi) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:ital,wght@0,400..700;1,400..600&family=Fraunces:ital,opsz,wght@1,9..144,300..500&family=Hanken+Grotesk:wght@300..800&family=Noto+Sans+Devanagari:wght@300..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
